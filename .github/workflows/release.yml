name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      BUILD_CHANNEL: release
      VITE_APP_VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_cmd: node ./node_modules/electron-builder/cli.js --linux AppImage --x64 --publish never --config.extraMetadata.version=${BUILD_VERSION}
          - os: windows-latest
            artifact: FunkHub-windows
            package_cmd: node ./node_modules/electron-builder/cli.js --win nsis portable --x64 --publish never --config.extraMetadata.version=${BUILD_VERSION}
            artifact_glob: |
              dist-desktop/*.exe
              dist-desktop/**/latest*.yml
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: macos-latest
            artifact: FunkHub-macos
            package_cmd: node ./node_modules/electron-builder/cli.js --mac dmg zip --publish never --config.extraMetadata.version=${BUILD_VERSION}
            artifact_glob: |
              dist-desktop/**/*.dmg
              dist-desktop/**/*.zip
              dist-desktop/**/latest*.yml
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            build_version="${GITHUB_REF_NAME#v}"
          else
            build_version=$(node -p "require('./package.json').version")
          fi
          echo "BUILD_VERSION=${build_version}" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=${build_version}" >> "$GITHUB_ENV"
          echo "Resolved build version: ${build_version}"

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer
        run: bun run build:renderer

      - name: Package desktop app
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Packaging attempt ${attempt}/3"
            if eval "${{ matrix.package_cmd }}"; then
              echo "Packaging succeeded on attempt ${attempt}."
              break
            fi

            if [[ "$attempt" -eq 3 ]]; then
              echo "Packaging failed after 3 attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "Transient packaging failure. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Remove macOS quarantine (workaround for unsigned builds)
        if: matrix.os == 'macos-latest'
        run: |
          find dist -name "*.app" -exec xattr -cr {} \; || true
          find dist -name "*.dmg" -exec xattr -cr {} \; || true

      - name: Verify Linux output
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          appimage_count=$(find dist-desktop -type f -name "*.AppImage" | wc -l | tr -d ' ')
          if [[ "$appimage_count" -eq 0 ]]; then
            echo "No Linux installer (.AppImage) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.AppImage" -print

      - name: Verify Windows installer output
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-desktop -Filter *.exe -File
          if ($files.Count -eq 0) {
            Write-Error "No Windows installers (.exe) were produced under dist-desktop/."
          }
          $files | ForEach-Object { Write-Host "Found Windows installer: $($_.FullName)" }

      - name: Verify macOS installer output
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          dmg_count=$(find dist-desktop -type f -name "*.dmg" | wc -l | tr -d ' ')
          if [[ "$dmg_count" -eq 0 ]]; then
            echo "No macOS installer (.dmg) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.dmg" -print

      - name: Upload build artifacts
        if: matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: FunkHub-linux-appimage
          path: |
            dist-desktop/**/*.AppImage
            dist-desktop/**/latest*.yml
            dist-desktop/**/*.blockmap
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download Linux AppImage artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: FunkHub-linux-appimage
          path: release-artifacts/FunkHub-linux-appimage

      - name: Download Windows artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: FunkHub-windows
          path: release-artifacts/FunkHub-windows

      - name: Download macOS artifact
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89e # v4.2.1
        with:
          name: FunkHub-macos
          path: release-artifacts/FunkHub-macos

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [[ -n "$TAG_VERSION" ]]; then
            echo "value=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "value=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify release payload
        shell: bash
        run: |
          set -euo pipefail
          linux_count=$(find release-artifacts/FunkHub-linux-appimage -type f -name "*.AppImage" | wc -l | tr -d ' ')
          windows_count=$(find release-artifacts/FunkHub-windows -maxdepth 1 -type f -name "*.exe" | wc -l | tr -d ' ')
          windows_update_metadata_count=$(find release-artifacts/FunkHub-windows -type f -name "latest*.yml" | wc -l | tr -d ' ')
          mac_dmg_count=$(find release-artifacts/FunkHub-macos -type f -name "*.dmg" | wc -l | tr -d ' ')
          mac_zip_count=$(find release-artifacts/FunkHub-macos -type f -name "*.zip" | wc -l | tr -d ' ')
          mac_update_metadata_count=$(find release-artifacts/FunkHub-macos -type f -name "latest*.yml" | wc -l | tr -d ' ')
          if [[ "$linux_count" -eq 0 ]]; then
            echo "Release payload missing Linux AppImage installer."
            exit 1
          fi
          if [[ "$windows_count" -eq 0 ]]; then
            echo "Release payload missing Windows .exe installers."
            exit 1
          fi
          if [[ "$windows_update_metadata_count" -eq 0 ]]; then
            echo "Release payload missing Windows updater metadata (latest*.yml)."
            exit 1
          fi
          if [[ "$mac_dmg_count" -eq 0 ]]; then
            echo "Release payload missing macOS .dmg installer."
            exit 1
          fi
          if [[ "$mac_zip_count" -eq 0 ]]; then
            echo "Release payload missing macOS .zip package required for auto-updater."
            exit 1
          fi
          if [[ "$mac_update_metadata_count" -eq 0 ]]; then
            echo "Release payload missing macOS updater metadata (latest*.yml)."
            exit 1
          fi
          find release-artifacts/FunkHub-linux-appimage -type f -name "*.AppImage" -print
          find release-artifacts/FunkHub-windows -maxdepth 1 -type f -name "*.exe" -print
          find release-artifacts/FunkHub-macos -type f -name "*.dmg" -print
          find release-artifacts/FunkHub-windows -type f -name "latest*.yml" -print
          find release-artifacts/FunkHub-macos -type f -name "*.zip" -print
          find release-artifacts/FunkHub-macos -type f -name "latest*.yml" -print

      - name: Build release asset manifest
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t files < <(
            {
              find release-artifacts/FunkHub-linux-appimage -type f -name "*.AppImage"
              find release-artifacts/FunkHub-linux-appimage -type f -name "latest-linux*.yml"
              find release-artifacts/FunkHub-linux-appimage -type f -name "*.blockmap"
              find release-artifacts/FunkHub-windows -type f \( -name "*.exe" -o -name "latest*.yml" -o -name "*.blockmap" \)
              find release-artifacts/FunkHub-macos -type f \( -name "*.dmg" -o -name "*.zip" -o -name "latest*.yml" -o -name "*.blockmap" \)
            } | sort
          )

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found after payload verification."
            exit 1
          fi

          duplicate_basenames=$(printf '%s\n' "${files[@]##*/}" | sort | uniq -d || true)
          if [[ -n "$duplicate_basenames" ]]; then
            echo "Duplicate release asset basenames detected:"
            printf '%s\n' "$duplicate_basenames"
            echo "Refusing to upload ambiguous asset names."
            exit 1
          fi

          echo "Release assets to upload:"
          printf '%s\n' "${files[@]}"

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and upload binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: FunkHub v${{ steps.version.outputs.value }}
          draft: false
          prerelease: false
          overwrite_files: true
          fail_on_unmatched_files: true
          files: ${{ steps.assets.outputs.files }}
