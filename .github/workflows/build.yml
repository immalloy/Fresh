name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "app/i18n/locales/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "app/i18n/locales/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle: appimage
            artifact: Fresh-linux-appimage
          - os: windows-latest
            bundle: nsis
            artifact: Fresh-windows
          - os: macos-latest
            bundle: dmg
            artifact: Fresh-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev

      - name: Install JS dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build renderer
        run: npm run build

      - name: Build Tauri bundle
        run: npm run tauri:build -- --bundles ${{ matrix.bundle }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: error
          retention-days: 14
