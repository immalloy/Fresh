name: Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "app/i18n/locales/**"
      - "**/*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "app/i18n/locales/**"
      - "**/*.md"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-desktop:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      BUILD_CHANNEL: nightly
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_cmd: node ./node_modules/electron-builder/cli.js --linux AppImage --x64 --publish never --config.extraMetadata.version=${BUILD_VERSION}
          - os: windows-latest
            artifact: FunkHub-windows
            package_cmd: node ./node_modules/electron-builder/cli.js --win nsis portable --x64 --publish never --config.extraMetadata.version=${BUILD_VERSION}
            artifact_glob: |
              dist-desktop/*.exe
              dist-desktop/**/latest*.yml
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap
          - os: macos-latest
            artifact: FunkHub-macos
            package_cmd: node ./node_modules/electron-builder/cli.js --mac dmg zip --publish never --config.extraMetadata.version=${BUILD_VERSION}
            artifact_glob: |
              dist-desktop/**/*.dmg
              dist-desktop/**/*.zip
              dist-desktop/**/latest*.yml
              dist-desktop/**/builder-*.yml
              dist-desktop/**/*.blockmap

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve build version
        shell: bash
        run: |
          set -euo pipefail
          base_version=$(node -p "require('./package.json').version")
          build_version="${base_version}-nightly.${GITHUB_RUN_NUMBER}"
          echo "BUILD_VERSION=${build_version}" >> "$GITHUB_ENV"
          echo "VITE_APP_VERSION=${build_version}" >> "$GITHUB_ENV"
          echo "Resolved build version: ${build_version}"

      - name: Typecheck
        run: bun run typecheck

      - name: Build renderer
        run: bun run build:renderer

      - name: Package desktop app
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Packaging attempt ${attempt}/3"
            if eval "${{ matrix.package_cmd }}"; then
              echo "Packaging succeeded on attempt ${attempt}."
              break
            fi

            if [[ "$attempt" -eq 3 ]]; then
              echo "Packaging failed after 3 attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 15))
            echo "Transient packaging failure. Retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Remove macOS quarantine (workaround for unsigned builds)
        if: matrix.os == 'macos-latest'
        run: |
          find dist -name "*.app" -exec xattr -cr {} \; || true
          find dist -name "*.dmg" -exec xattr -cr {} \; || true

      - name: Verify Linux output
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          set -euo pipefail
          appimage_count=$(find dist-desktop -type f -name "*.AppImage" | wc -l | tr -d ' ')
          if [[ "$appimage_count" -eq 0 ]]; then
            echo "No Linux installer (.AppImage) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.AppImage" -print

      - name: Verify Windows installer output
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path dist-desktop -Filter *.exe -File
          if ($files.Count -eq 0) {
            Write-Error "No Windows installers (.exe) were produced under dist-desktop/."
          }
          $metadata = Get-ChildItem -Path dist-desktop -Recurse -Filter "latest*.yml" -File
          if ($metadata.Count -eq 0) {
            Write-Error "No Windows updater metadata (latest*.yml) was produced under dist-desktop/."
          }
          $files | ForEach-Object { Write-Host "Found Windows installer: $($_.FullName)" }
          $metadata | ForEach-Object { Write-Host "Found Windows updater metadata: $($_.FullName)" }

      - name: Verify macOS installer output
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          dmg_count=$(find dist-desktop -type f -name "*.dmg" | wc -l | tr -d ' ')
          zip_count=$(find dist-desktop -type f -name "*.zip" | wc -l | tr -d ' ')
          updater_metadata_count=$(find dist-desktop -type f -name "latest*.yml" | wc -l | tr -d ' ')
          if [[ "$dmg_count" -eq 0 ]]; then
            echo "No macOS installer (.dmg) was produced under dist-desktop/."
            exit 1
          fi
          if [[ "$zip_count" -eq 0 ]]; then
            echo "No macOS updater package (.zip) was produced under dist-desktop/."
            exit 1
          fi
          if [[ "$updater_metadata_count" -eq 0 ]]; then
            echo "No macOS updater metadata (latest*.yml) was produced under dist-desktop/."
            exit 1
          fi
          find dist-desktop -type f -name "*.dmg" -print
          find dist-desktop -type f -name "*.zip" -print
          find dist-desktop -type f -name "latest*.yml" -print

      - name: Upload build artifacts
        if: matrix.os != 'ubuntu-latest'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Linux AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: FunkHub-linux-appimage
          path: |
            dist-desktop/**/*.AppImage
            dist-desktop/**/latest*.yml
            dist-desktop/**/*.blockmap
          if-no-files-found: error
          retention-days: 14
