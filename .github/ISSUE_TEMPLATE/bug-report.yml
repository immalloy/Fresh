name: Bug report
description: Report a reproducible bug in FunkHub
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Fill out the details below so we can reproduce it quickly.

  - type: input
    id: app-version
    attributes:
      label: FunkHub version
      placeholder: v0.1.1
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include exact clicks/URLs used.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: input
    id: engine
    attributes:
      label: Engine and version
      placeholder: Psych Engine 1.0.0

  - type: textarea
    id: logs
    attributes:
      label: Error message / logs / screenshots
      description: Paste stack traces or attach screenshots if available.

  - type: textarea
    id: oneclick
    attributes:
      label: One-click install details (if relevant)
      placeholder: |
        - GameBanana page URL:
        - Link format received by app:
        - Was app already running:
